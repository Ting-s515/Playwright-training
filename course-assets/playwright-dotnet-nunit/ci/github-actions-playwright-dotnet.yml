name: Playwright DotNet Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ./course-assets/playwright-dotnet-nunit/PlaywrightCourse.Tests/PlaywrightCourse.Tests.csproj

      - name: Build
        run: dotnet build ./course-assets/playwright-dotnet-nunit/PlaywrightCourse.Tests/PlaywrightCourse.Tests.csproj --no-restore

      - name: Install Playwright Browsers
        run: pwsh ./course-assets/playwright-dotnet-nunit/PlaywrightCourse.Tests/bin/Debug/net9.0/playwright.ps1 install --with-deps

      - name: Run Tests
        run: dotnet test ./course-assets/playwright-dotnet-nunit/PlaywrightCourse.Tests/PlaywrightCourse.Tests.csproj --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          if-no-files-found: warn

      - name: Upload Trace Files On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: ./TestResults/**/*.zip
          if-no-files-found: ignore
